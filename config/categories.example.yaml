# Canonical category taxonomy — SANITIZED TEMPLATE (committed).
#
# Your real config/categories.yaml is gitignored, because its `plan` labels must match the
# column headers in your (private) plan spreadsheet. Copy this to config/categories.yaml
# and adjust the names + plan labels to your own.
#
# kind:    income | expense | transfer | sinking
# section: grouping shown in reports
# plan:    the plan line this category rolls up to for variance (null = unbudgeted).
categories:
  # ---- INCOME ----
  Salary:              { section: INCOME,   kind: income,   plan: "Salary" }
  Bonus & Allowances:  { section: INCOME,   kind: income,   plan: "Bonus" }
  Rental Income:       { section: INCOME,   kind: income,   plan: "Rental Income" }
  Other Income:        { section: INCOME,   kind: income,   plan: "Other Income" }
  Cashback:            { section: INCOME,   kind: income,   plan: null }

  # ---- INTERNAL (netted out) ----
  Internal Transfer:   { section: INTERNAL, kind: transfer, plan: null }

  # ---- FIXED / OBLIGATIONS ----
  Housing:             { section: FIXED,    kind: expense,  plan: "Rent" }
  Car Loan:            { section: FIXED,    kind: expense,  plan: "Car Loan" }
  Education:           { section: FIXED,    kind: sinking,  plan: "Tuition" }
  School Transport:    { section: FIXED,    kind: expense,  plan: "School Transport" }
  Activities:          { section: FIXED,    kind: expense,  plan: "Activities" }
  Recipient B:   { section: FIXED,    kind: expense,  plan: "Recipient B" }
  Recipient A:       { section: FIXED,    kind: expense,  plan: "Recipient A" }

  # ---- VARIABLE / DISCRETIONARY ----
  Groceries:           { section: VARIABLE, kind: expense,  plan: "Groceries" }
  Food Delivery:       { section: VARIABLE, kind: expense,  plan: "Variable" }
  Dining:              { section: VARIABLE, kind: expense,  plan: "Variable" }
  Transport:           { section: VARIABLE, kind: expense,  plan: "Variable" }
  Subscriptions:       { section: VARIABLE, kind: expense,  plan: "Variable" }
  Health:              { section: VARIABLE, kind: expense,  plan: "Variable" }
  Shopping:            { section: VARIABLE, kind: expense,  plan: "Variable" }
  Insurance:           { section: VARIABLE, kind: expense,  plan: "Variable" }
  Personal Care:       { section: VARIABLE, kind: expense,  plan: "Variable" }
  Telecom:             { section: VARIABLE, kind: expense,  plan: null }

  # ---- OTHER ----
  Personal Transfer:   { section: OTHER,    kind: expense,  plan: null }
  Charity:             { section: OTHER,    kind: expense,  plan: null }
  Personal:            { section: OTHER,    kind: expense,  plan: null }
  Government & Fees:   { section: OTHER,    kind: expense,  plan: null }
  Bank Charges:        { section: OTHER,    kind: expense,  plan: null }
  CC Debt Payoff:      { section: OTHER,    kind: expense,  plan: "CC Debt Payoff" }
  Uncategorised:       { section: REVIEW,   kind: expense,  plan: null }
